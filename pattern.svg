<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 1140" width="400" height="1140" font-family="-apple-system, system-ui, sans-serif">
  <!-- Background -->
  <rect width="400" height="1140" fill="#0a0f1a"/>

  <!-- Header -->
  <text x="200" y="26" font-size="17" font-weight="700" fill="#e5e7eb" text-anchor="middle">Cherokee 140 Pattern Flow</text>
  <text x="200" y="43" font-size="10" fill="#9ca3af" text-anchor="middle">Speeds · flaps · RPM · fuel pump · radio · carb heat</text>

  <!-- BEFORE ENTERING TPA strip -->
  <g>
    <rect x="10" y="58" width="380" height="70" rx="4" fill="#0f172a" stroke="#4f46e5" stroke-width="1"/>
    <text x="20" y="76" font-size="11" font-weight="700" fill="#a5b4fc">BEFORE ENTERING TPA</text>
    <text x="20" y="90" font-size="9" fill="#e5e7eb">• ATIS/AWOS — runway, wind, altimeter</text>
    <text x="20" y="102" font-size="9" fill="#e5e7eb">• Fuel selector → fullest tank · Mixture → RICH · Landing light → ON</text>
    <text x="20" y="114" font-size="9" fill="#e5e7eb">• Doors/windows latched · Seatbelts &amp; harness tight · Radio 10 mi out</text>
  </g>

  <!-- Runway -->
  <g>
    <rect x="290" y="200" width="30" height="640" fill="#1f2937" stroke="#4b5563" stroke-width="1"/>
    <line x1="305" y1="215" x2="305" y2="830" stroke="#e5e7eb" stroke-width="1.2" stroke-dasharray="10 10"/>
    <g fill="#e5e7eb">
      <rect x="292" y="820" width="3" height="12"/>
      <rect x="297" y="820" width="3" height="12"/>
      <rect x="302" y="820" width="3" height="12"/>
      <rect x="307" y="820" width="3" height="12"/>
      <rect x="312" y="820" width="3" height="12"/>
    </g>
    <text x="305" y="800" font-size="9" fill="#e5e7eb" text-anchor="middle" font-weight="700">36</text>
    <text x="305" y="220" font-size="9" fill="#e5e7eb" text-anchor="middle" font-weight="700">18</text>
  </g>

  <!-- Pattern path (dashed cyan) -->
  <path d="M 305 200
           L 305 170
           Q 275 170 255 180
           L 130 180
           Q 100 180 100 215
           L 100 810
           Q 100 840 130 840
           L 260 840
           Q 305 840 305 810
           L 305 780"
        stroke="#22d3ee" stroke-width="1.8" fill="none" stroke-dasharray="6 4"/>

  <!-- Aircraft symbols -->
  <g transform="translate(305 165)">
    <polygon points="0,-7 5,5 -5,5" fill="#a5b4fc" stroke="#4f46e5" stroke-width="1"/>
  </g>
  <g transform="translate(100 400) rotate(180)">
    <polygon points="0,-7 5,5 -5,5" fill="#a5b4fc" stroke="#4f46e5" stroke-width="1"/>
  </g>
  <g transform="translate(100 700) rotate(180)">
    <polygon points="0,-7 5,5 -5,5" fill="#fbbf24" stroke="#b45309" stroke-width="1"/>
  </g>
  <g transform="translate(200 840) rotate(90)">
    <polygon points="0,-7 5,5 -5,5" fill="#fbbf24" stroke="#b45309" stroke-width="1"/>
  </g>
  <g transform="translate(305 810) rotate(0)">
    <polygon points="0,-7 5,5 -5,5" fill="#4ade80" stroke="#16a34a" stroke-width="1"/>
  </g>

  <!-- ① UPWIND CLIMB -->
  <g>
    <rect x="150" y="135" width="140" height="42" rx="4" fill="#1e293b" stroke="#4f46e5" stroke-width="1"/>
    <text x="157" y="149" font-size="10" font-weight="700" fill="#a5b4fc">① UPWIND CLIMB</text>
    <text x="157" y="162" font-size="9" fill="#e5e7eb">85 MPH (Vy) · Flaps UP</text>
    <text x="157" y="173" font-size="9" fill="#9ca3af">Full throttle · ~2400 RPM</text>
  </g>

  <!-- ② DOWNWIND (rich) -->
  <g>
    <rect x="10" y="320" width="150" height="115" rx="4" fill="#1e293b" stroke="#4f46e5" stroke-width="1"/>
    <text x="17" y="336" font-size="10" font-weight="700" fill="#a5b4fc">② DOWNWIND</text>
    <text x="17" y="349" font-size="9" fill="#e5e7eb">90 MPH · Level TPA · Flaps UP</text>
    <text x="17" y="360" font-size="9" fill="#9ca3af">~2200 RPM (fixed pitch varies)</text>
    <text x="17" y="376" font-size="9" font-weight="700" fill="#e5e7eb">Landing flow (FMS):</text>
    <text x="17" y="388" font-size="9" fill="#e5e7eb">F — Fuel pump ON · fullest tank</text>
    <text x="17" y="399" font-size="9" fill="#e5e7eb">M — Mixture RICH</text>
    <text x="17" y="410" font-size="9" fill="#e5e7eb">S — Seatbelts tight</text>
    <text x="17" y="424" font-size="9" fill="#22d3ee">📻 "N86EC left downwind [rwy]"</text>
  </g>

  <!-- ③ ABEAM NUMBERS - explicit ORDER -->
  <g>
    <rect x="10" y="630" width="150" height="118" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
    <text x="17" y="646" font-size="10" font-weight="700" fill="#fbbf24">③ ABEAM NUMBERS</text>
    <text x="17" y="660" font-size="9" font-weight="700" fill="#e5e7eb">Do these IN ORDER:</text>
    <text x="17" y="673" font-size="9" fill="#e5e7eb">1. Carb heat ON</text>
    <text x="17" y="685" font-size="9" fill="#9ca3af">   (before throttle — drops RPM)</text>
    <text x="17" y="697" font-size="9" fill="#e5e7eb">2. Throttle → ~1700 RPM</text>
    <text x="17" y="709" font-size="9" fill="#e5e7eb">3. Flaps 1st notch (10°)</text>
    <text x="17" y="721" font-size="9" fill="#9ca3af">   as speed passes 100 MPH</text>
    <text x="17" y="733" font-size="9" fill="#e5e7eb">4. Begin descent, trim to 80</text>
    <text x="17" y="745" font-size="9" fill="#22d3ee">📻 (if busy freq)</text>
  </g>

  <!-- ④ BASE -->
  <g>
    <rect x="130" y="870" width="150" height="65" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
    <text x="137" y="886" font-size="10" font-weight="700" fill="#fbbf24">④ BASE</text>
    <text x="137" y="899" font-size="9" fill="#e5e7eb">80 MPH · Flaps 25° (2nd)</text>
    <text x="137" y="910" font-size="9" fill="#9ca3af">~1500-1700 RPM · glidepath</text>
    <text x="137" y="924" font-size="9" fill="#22d3ee">📻 "turning left base"</text>
  </g>

  <!-- ⑤ FINAL -->
  <g>
    <rect x="10" y="770" width="150" height="80" rx="4" fill="#1e293b" stroke="#16a34a" stroke-width="1"/>
    <text x="17" y="786" font-size="10" font-weight="700" fill="#4ade80">⑤ FINAL</text>
    <text x="17" y="800" font-size="9" fill="#e5e7eb">75 MPH · Full flaps (40°)</text>
    <text x="17" y="812" font-size="9" fill="#9ca3af">Trim hands-off · pitch=speed</text>
    <text x="17" y="824" font-size="9" fill="#9ca3af">throttle=path</text>
    <text x="17" y="838" font-size="9" fill="#22d3ee">📻 "final [rwy] full stop"</text>
  </g>

  <!-- ⑥ SHORT FINAL / FENCE -->
  <g>
    <rect x="10" y="875" width="105" height="72" rx="4" fill="#1e293b" stroke="#16a34a" stroke-width="1"/>
    <text x="17" y="891" font-size="10" font-weight="700" fill="#4ade80">⑥ SHORT FINAL</text>
    <text x="17" y="904" font-size="9" font-weight="700" fill="#e5e7eb">Landing assured:</text>
    <text x="17" y="915" font-size="9" fill="#e5e7eb">Carb heat → COLD</text>
    <text x="17" y="926" font-size="9" fill="#e5e7eb">70 MPH over fence</text>
    <text x="17" y="937" font-size="9" fill="#9ca3af">Fuel pump stays ON</text>
  </g>

  <!-- Wind arrow -->
  <g transform="translate(360 870)">
    <text x="0" y="0" font-size="8" fill="#9ca3af" text-anchor="middle">WIND</text>
    <line x1="0" y1="4" x2="0" y2="26" stroke="#9ca3af" stroke-width="1.4"/>
    <polygon points="0,28 -3,22 3,22" fill="#9ca3af"/>
  </g>

  <!-- AFTER LANDING strip -->
  <g>
    <rect x="10" y="970" width="380" height="52" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
    <text x="20" y="988" font-size="11" font-weight="700" fill="#22d3ee">AFTER LANDING — CLEAR OF RUNWAY</text>
    <text x="20" y="1002" font-size="9" fill="#e5e7eb">• Flaps UP · Carb heat COLD · Electric fuel pump OFF</text>
    <text x="20" y="1014" font-size="9" fill="#e5e7eb">• Transponder STBY · Landing light OFF · Taxi normally</text>
  </g>

  <!-- GO-AROUND -->
  <g>
    <rect x="10" y="1032" width="380" height="60" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1.5"/>
    <text x="20" y="1050" font-size="11" font-weight="700" fill="#ef4444">⚠ GO-AROUND (any time)</text>
    <text x="20" y="1063" font-size="9" fill="#e5e7eb">1. Throttle FULL smoothly  2. Carb heat COLD  3. Pitch for Vy (85)</text>
    <text x="20" y="1074" font-size="9" fill="#e5e7eb">4. Flaps UP in stages (Johnson bar is manual — not all at once)</text>
    <text x="20" y="1085" font-size="9" fill="#e5e7eb">5. Positive rate → announce, sidestep, re-enter downwind</text>
  </g>

  <!-- Legend -->
  <g>
    <rect x="10" y="1100" width="380" height="34" rx="4" fill="#0f172a" stroke="#374151"/>
    <text x="20" y="1114" font-size="9" fill="#22d3ee">■ POH-published: 75/80 MPH approach · Vy 85 · Vfe 115</text>
    <text x="20" y="1126" font-size="9" fill="#fbbf24">■ Practice: pattern breakdown &amp; RPM approximations (adjust to hold speed)</text>
  </g>
</svg>
